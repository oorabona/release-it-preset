# Dependabot configuration
# Reference: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm packages (dependencies + devDependencies + peerDependencies of package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      # Bundle non-major dev-dep bumps into a single weekly PR.
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Same for production deps (currently empty — preset has no runtime deps).
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    # Major bumps (any dependency) still get individual PRs so they can be reviewed
    # in isolation. They don't match the groups above and fall through to the
    # default per-package behavior.

  # GitHub Actions used in .github/workflows/*.yml — bump action versions
  # (actions/checkout, actions/setup-node, pnpm/action-setup, etc.).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    groups:
      gha-deps:
        update-types:
          - "minor"
          - "patch"
