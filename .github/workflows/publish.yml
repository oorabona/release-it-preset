name: Publish Package

# Single workflow for both initial publish (tag push) and manual replay
# (workflow_dispatch). Uses npm OIDC trusted publishing — no NPM_TOKEN needed.
# Configure the OIDC trusted publisher on npmjs against this workflow path
# (.github/workflows/publish.yml).
# Canonical manual replay for attestations: gh workflow run publish.yml --ref vX.Y.Z (tag ref required).
# workflow_call callers must grant actions: read for the nested SLSA generator.

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        description: 'Tag to publish (defaults to the triggering tag)'
        type: string
        required: false
      npm_only:
        description: 'Publish to npm only (skip GitHub Release)'
        type: boolean
        default: false
      github_only:
        description: 'Create GitHub Release only (skip npm publish)'
        type: boolean
        default: false
      dist_tag:
        description: 'npm dist-tag override (default: auto — `latest` only when version is newest)'
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.10.1). Required when triggered from a branch.'
        type: string
        required: false
      npm_only:
        description: 'Publish to npm only (skip GitHub Release)'
        type: boolean
        default: false
      github_only:
        description: 'Create GitHub Release only (skip npm publish)'
        type: boolean
        default: false
      dist_tag:
        description: 'npm dist-tag override (default: auto — `latest` only when version is newest)'
        type: string
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: publish-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'  # npm >= 11.5.1 ships with Node 24, required for OIDC trusted publishing

jobs:
  build-dist:
    uses: oorabona/release-it-preset/.github/workflows/build-dist.yml@main
    permissions:
      contents: read
    with:
      artifact_name: dist-build
      ref: ${{ inputs.tag || github.ref }}
    secrets: inherit

  publish:
    runs-on: ubuntu-latest
    needs: build-dist
    permissions:
      contents: write
      id-token: write  # Required for npm OIDC trusted publishing
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-dist.outputs.artifact_name }}
          path: dist

      - name: Show current commit
        run: |
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Refs: $(git describe --all 2>/dev/null || true)"

      - name: Run pre-flight checks
        run: pnpm release-it-preset retry-publish-preflight

      # npm rejects publishing the same version twice. Detect early so the
      # workflow can skip cleanly instead of failing — useful for idempotent
      # replays (e.g. when the GitHub release step needs a retry but npm
      # already shipped). The GitHub release update step still runs.
      - name: Check if version already on registry
        id: registry_state
        run: |
          PKG="$(jq -r .name package.json)"
          VER="$(jq -r .version package.json)"
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  ${PKG}@${VER} already published — npm publish step will be skipped."
            echo "   To adjust the npm dist-tag, run: npm dist-tag add ${PKG}@${VER} <tag>"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "✅ ${PKG}@${VER} not yet on npm — will publish."
          fi

      # Decide which npm dist-tag to set. When republishing an older version
      # we must NOT overwrite `latest`; we use a version-named dist-tag instead
      # (e.g. `v0.10.0`). Caller can force a specific tag via the workflow input.
      - name: Determine npm dist-tag
        id: dist_tag
        run: |
          PUBLISHING="$(jq -r .version package.json)"
          PKG="$(jq -r .name package.json)"

          # Strip semver '+build' metadata before any prerelease detection.
          # Without this, 1.0.0+build-foo (no prerelease, but '-' in metadata)
          # would falsely match the prerelease branch.
          PUBLISHING_NO_BUILD="${PUBLISHING%%+*}"

          if [ -n "${{ inputs.dist_tag }}" ]; then
            TAG="${{ inputs.dist_tag }}"
            REASON="explicit input"
          elif [[ "$PUBLISHING_NO_BUILD" == *-* ]]; then
            # Pre-release (semver '-' indicator): use the prerelease identifier as
            # the dist-tag so 'latest' is never demoted to a beta/rc/alpha.
            # 1.0.0-beta.1 -> beta, 2.0.0-rc.2 -> rc, 1.5.0-alpha.5 -> alpha.
            # Users opt in via 'npm install <pkg>@beta' / '@rc' / '@alpha' etc.
            PRERELEASE_ID="${PUBLISHING_NO_BUILD#*-}"
            PRERELEASE_ID="${PRERELEASE_ID%%.*}"
            TAG="$PRERELEASE_ID"
            REASON="pre-release ($PUBLISHING) - using $PRERELEASE_ID, latest unchanged"
          else
            CURRENT_LATEST="$(npm view "${PKG}" version 2>/dev/null || true)"
            if [ -z "$CURRENT_LATEST" ]; then
              TAG="latest"
              REASON="first publish"
            elif [ "$(printf '%s\n%s\n' "$PUBLISHING" "$CURRENT_LATEST" | sort -V | tail -1)" = "$PUBLISHING" ] \
                 && [ "$PUBLISHING" != "$CURRENT_LATEST" ]; then
              TAG="latest"
              REASON="newer than current latest ($CURRENT_LATEST)"
            elif [ "$PUBLISHING" = "$CURRENT_LATEST" ]; then
              TAG="latest"
              REASON="same as current latest (idempotent)"
            else
              TAG="v$PUBLISHING"
              REASON="older than current latest ($CURRENT_LATEST) — using version-named tag"
            fi
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📌 Publishing ${PKG}@${PUBLISHING} with --tag ${TAG} (${REASON})"

      - name: Publish (npm + GitHub release per inputs)
        # OIDC trusted publishing: the npm CLI handles auth at publish time via
        # the id-token. NPM_SKIP_CHECKS bypasses release-it's pre-publish
        # `npm whoami`, which has no static identity to verify under OIDC.
        # NPM_PUBLISH falls back to `false` when the version is already on
        # the registry, leaving room for the GitHub release step to still run.
        run: pnpm release-it-preset retry-publish --ci
        env:
          NPM_PUBLISH: ${{ (inputs.github_only || steps.registry_state.outputs.already_published == 'true') && 'false' || 'true' }}
          GITHUB_RELEASE: ${{ inputs.npm_only && 'false' || 'true' }}
          NPM_SKIP_CHECKS: 'true'
          NPM_TAG: ${{ steps.dist_tag.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          echo "## Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag**: ${REF}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.npm_only }}" = "true" ]; then
            echo "**Scope**: npm only" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ inputs.github_only }}" = "true" ]; then
            echo "**Scope**: GitHub release only" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Scope**: npm + GitHub release" >> "$GITHUB_STEP_SUMMARY"
          fi

  attest-hash:
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ !inputs.npm_only && needs.publish.result == 'success' && github.ref == format('refs/tags/{0}', inputs.tag || github.ref_name) }}
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.pack.outputs.hashes }}
      tgz: ${{ steps.pack.outputs.tgz }}
      pkg: ${{ steps.pack.outputs.pkg }}
      version: ${{ steps.pack.outputs.version }}
      should_attest: ${{ steps.pack.outputs.should_attest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download registry tarball and hash subject
        id: pack
        env:
          GITHUB_ONLY: ${{ inputs.github_only }}
        run: |
          set -euo pipefail

          PKG="$(jq -r .name package.json)"
          VER="$(jq -r .version package.json)"
          VER="${VER#v}"

          if [ "${GITHUB_ONLY}" = "true" ] && ! npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "::notice::github_only run and ${PKG}@${VER} is not on npm — skipping attestation; heal with a full replay on the tag ref once npm has the version"
            echo "should_attest=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          BASENAME="${PKG#@}"
          BASENAME="${BASENAME//\//-}"
          TGZ="${BASENAME}-${VER}.tgz"
          PACK_DIR="${RUNNER_TEMP}/npm-pack-subject"

          rm -rf "${PACK_DIR}"
          mkdir -p "${PACK_DIR}"
          cd "${PACK_DIR}"

          for attempt in 1 2 3 4 5; do
            rm -f "${TGZ}"
            if npm pack "${PKG}@${VER}" > npm-pack.log 2>&1 && [ -f "${TGZ}" ]; then
              break
            fi

            if [ "${attempt}" -eq 5 ]; then
              echo "::error::npm pack did not produce ${TGZ} after 5 attempts"
              cat npm-pack.log >&2 || true
              exit 1
            fi

            sleep 12
          done

          cd "${GITHUB_WORKSPACE}"
          REGISTRY_GITHEAD="$(npm view "${PKG}@${VER}" gitHead 2>/dev/null || true)"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ -z "${REGISTRY_GITHEAD}" ] || [ "${REGISTRY_GITHEAD}" != "${HEAD_SHA}" ]; then
            echo "::error::Refusing to attest: registry ${PKG}@${VER} gitHead (${REGISTRY_GITHEAD:-absent}) does not match the attested ref commit (${HEAD_SHA}). The published bytes were not built from this tag."
            exit 1
          fi
          cd "${PACK_DIR}"

          {
            echo "pkg=${PKG}"
            echo "version=${VER}"
            echo "tgz=${TGZ}"
            echo "hashes=$(sha256sum "${TGZ}" | base64 -w0)"
            echo "should_attest=true"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload registry tarball artifact
        if: steps.pack.outputs.should_attest == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: registry-tarball
          path: ${{ runner.temp }}/npm-pack-subject/${{ steps.pack.outputs.tgz }}
          if-no-files-found: error

  provenance:
    needs: [publish, attest-hash]
    if: ${{ !inputs.npm_only && needs.publish.result == 'success' && needs.attest-hash.result == 'success' && needs.attest-hash.outputs.should_attest == 'true' && github.ref == format('refs/tags/{0}', inputs.tag || github.ref_name) }}
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.attest-hash.outputs.hashes }}
      provenance-name: ${{ needs.attest-hash.outputs.tgz }}.intoto.jsonl
      upload-assets: false

  attach-attestations:
    runs-on: ubuntu-latest
    needs: [publish, attest-hash, provenance]
    if: ${{ !inputs.npm_only && needs.publish.result == 'success' && needs.attest-hash.result == 'success' && needs.attest-hash.outputs.should_attest == 'true' && needs.provenance.result == 'success' && github.ref == format('refs/tags/{0}', inputs.tag || github.ref_name) }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download registry tarball
        uses: actions/download-artifact@v8
        with:
          name: registry-tarball
          path: release-assets

      - name: Download provenance artifact
        uses: actions/download-artifact@v8
        with:
          path: provenance

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign and upload release assets
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
          TGZ: ${{ needs.attest-hash.outputs.tgz }}
          GH_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cd release-assets

          if [ ! -f "${TGZ}" ]; then
            echo "::error::Expected registry tarball ${TGZ} was not downloaded"
            exit 1
          fi

          PROVENANCE="$(find "${GITHUB_WORKSPACE}/provenance" -type f -name "${TGZ}.intoto.jsonl" -print -quit)"
          if [ -z "${PROVENANCE}" ]; then
            echo "::error::Expected provenance ${TGZ}.intoto.jsonl was not downloaded"
            find "${GITHUB_WORKSPACE}/provenance" -type f -print >&2 || true
            exit 1
          fi
          cp "${PROVENANCE}" "${TGZ}.intoto.jsonl"

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::error::GitHub release ${TAG} was not found; refusing to upload attestations"
            exit 1
          fi

          cosign sign-blob --yes --bundle "${TGZ}.sigstore.json" "${TGZ}"
          gh release upload "${TAG}" "${TGZ}" "${TGZ}.intoto.jsonl" "${TGZ}.sigstore.json" --clobber
