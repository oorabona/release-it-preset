name: Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        description: 'Tag to publish (optional, defaults to latest tag from git describe)'
        type: string
        required: false
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.10.1). Defaults to the workflow ref.'
        type: string
        required: false

permissions:
  contents: write
  id-token: write  # Required for npm OIDC trusted publishing

env:
  NODE_VERSION: '24'  # npm >= 11.5.1 ships with Node 24, required for OIDC trusted publishing

jobs:
  build-dist:
    uses: oorabona/release-it-preset/.github/workflows/build-dist.yml@main
    with:
      artifact_name: dist-build
    secrets: inherit

  publish:
    runs-on: ubuntu-latest
    needs: build-dist

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-dist.outputs.artifact_name }}
          path: dist

      - name: Update GitHub release and publish to npm
        # OIDC trusted publishing: npm CLI handles auth at publish time via the
        # id-token. NPM_SKIP_CHECKS bypasses release-it's pre-publish `npm whoami`,
        # which has no usable identity until the publish handshake fires.
        run: pnpm release-it-preset retry-publish --ci
        env:
          NPM_PUBLISH: 'true'
          NPM_SKIP_CHECKS: 'true'
          GITHUB_RELEASE: 'true'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
