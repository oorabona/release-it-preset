name: Publish Package

# Single workflow for both initial publish (tag push) and manual replay
# (workflow_dispatch). Uses npm OIDC trusted publishing — no NPM_TOKEN needed.
# Configure the OIDC trusted publisher on npmjs against this workflow path
# (.github/workflows/publish.yml).

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag:
        description: 'Tag to publish (defaults to the triggering tag)'
        type: string
        required: false
      npm_only:
        description: 'Publish to npm only (skip GitHub Release)'
        type: boolean
        default: false
      github_only:
        description: 'Create GitHub Release only (skip npm publish)'
        type: boolean
        default: false
      dist_tag:
        description: 'npm dist-tag override (default: auto — `latest` only when version is newest)'
        type: string
        required: false
        default: ''
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.10.1). Required when triggered from a branch.'
        type: string
        required: false
      npm_only:
        description: 'Publish to npm only (skip GitHub Release)'
        type: boolean
        default: false
      github_only:
        description: 'Create GitHub Release only (skip npm publish)'
        type: boolean
        default: false
      dist_tag:
        description: 'npm dist-tag override (default: auto — `latest` only when version is newest)'
        type: string
        required: false
        default: ''

permissions:
  contents: write
  id-token: write  # Required for npm OIDC trusted publishing

env:
  NODE_VERSION: '24'  # npm >= 11.5.1 ships with Node 24, required for OIDC trusted publishing

jobs:
  build-dist:
    uses: oorabona/release-it-preset/.github/workflows/build-dist.yml@main
    with:
      artifact_name: dist-build
      ref: ${{ inputs.tag || github.ref }}
    secrets: inherit

  publish:
    runs-on: ubuntu-latest
    needs: build-dist
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-dist.outputs.artifact_name }}
          path: dist

      - name: Show current commit
        run: |
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Refs: $(git describe --all 2>/dev/null || true)"

      - name: Run pre-flight checks
        run: pnpm release-it-preset retry-publish-preflight

      # Decide which npm dist-tag to set. When republishing an older version
      # we must NOT overwrite `latest`; we use a version-named dist-tag instead
      # (e.g. `v0.10.0`). Caller can force a specific tag via the workflow input.
      - name: Determine npm dist-tag
        id: dist_tag
        run: |
          PUBLISHING="$(node -p 'require("./package.json").version')"
          PKG="$(node -p 'require("./package.json").name')"

          if [ -n "${{ inputs.dist_tag }}" ]; then
            TAG="${{ inputs.dist_tag }}"
            REASON="explicit input"
          else
            CURRENT_LATEST="$(npm view "${PKG}" version 2>/dev/null || true)"
            if [ -z "$CURRENT_LATEST" ]; then
              TAG="latest"
              REASON="first publish"
            elif [ "$(printf '%s\n%s\n' "$PUBLISHING" "$CURRENT_LATEST" | sort -V | tail -1)" = "$PUBLISHING" ] \
                 && [ "$PUBLISHING" != "$CURRENT_LATEST" ]; then
              TAG="latest"
              REASON="newer than current latest ($CURRENT_LATEST)"
            elif [ "$PUBLISHING" = "$CURRENT_LATEST" ]; then
              TAG="latest"
              REASON="same as current latest (idempotent)"
            else
              TAG="v$PUBLISHING"
              REASON="older than current latest ($CURRENT_LATEST) — using version-named tag"
            fi
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📌 Publishing ${PKG}@${PUBLISHING} with --tag ${TAG} (${REASON})"

      - name: Publish (npm + GitHub release per inputs)
        # OIDC trusted publishing: the npm CLI handles auth at publish time via
        # the id-token. NPM_SKIP_CHECKS bypasses release-it's pre-publish
        # `npm whoami`, which has no static identity to verify under OIDC.
        run: pnpm release-it-preset retry-publish --ci
        env:
          NPM_PUBLISH: ${{ inputs.github_only && 'false' || 'true' }}
          GITHUB_RELEASE: ${{ inputs.npm_only && 'false' || 'true' }}
          NPM_SKIP_CHECKS: 'true'
          NPM_TAG: ${{ steps.dist_tag.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          echo "## Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag**: ${REF}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.npm_only }}" = "true" ]; then
            echo "**Scope**: npm only" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ inputs.github_only }}" = "true" ]; then
            echo "**Scope**: GitHub release only" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Scope**: npm + GitHub release" >> "$GITHUB_STEP_SUMMARY"
          fi
